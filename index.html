    <!-- Structured data: FAQ (answers live in the served HTML for answer engines) -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "FAQPage",
        "mainEntity": [
          {
            "@type": "Question",
            "name": "What is Magni Automations?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "Magni Automations is an AI automation agency that designs and builds custom AI systems for businesses. We build AI agents, n8n workflows, and voice agents that capture leads, support customers, handle repetitive work, and help businesses scale without adding headcount."
            }
          },
          {
            "@type": "Question",
            "name": "What does an AI automation agency do?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "An AI automation agency identifies repetitive, time-consuming tasks in a business and builds AI-powered systems to handle them automatically. That includes qualifying and following up with leads, answering customer questions, creating and publishing content, processing documents and receipts, and connecting the tools a business already uses so work flows without manual effort."
            }
          },
          {
            "@type": "Question",
            "name": "What business processes can Magni Automations automate?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "We automate work across sales, marketing, customer support, onboarding, finance, and operations. Common builds include AI lead capture and qualification, AI voice receptionists that book appointments, content creation pipelines, expense and receipt tracking, and custom workflows tailored to a company's specific tools and data."
            }
          },
          {
            "@type": "Question",
            "name": "Which tools and platforms do you build with?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "We are platform-agnostic and use whatever fits the job best, including automation platforms like n8n, Make.com, and Zapier, as well as custom code when a build calls for it. We connect leading AI models such as OpenAI, Google Gemini, and Claude, plus voice platforms like ElevenLabs. Systems integrate with the tools businesses already rely on, including Google Sheets, Google Calendar, Gmail, Telegram, LinkedIn, CRMs, and vector databases."
            }
          },
          {
            "@type": "Question",
            "name": "How much does AI automation cost?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "Cost depends on the scope and complexity of the system being built. Every engagement starts with a free consultation where we map out where AI automation can save time and win revenue, then scope a build to fit the goals and budget. Reach out at support@magniautomation.com to get a tailored estimate."
            }
          },
          {
            "@type": "Question",
            "name": "How do I get started with Magni Automations?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "Book a free consultation by emailing support@magniautomation.com. We review your current workflows, identify the highest-impact automation opportunities, and map out a custom AI system before any build begins."
            }
          }
        ]
      }
